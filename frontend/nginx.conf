server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- ROTAS DO JOBRUNR (PORTA 8000 NO CONTAINER BACKEND) ---
  location /dashboard {
    # Troque 127.0.0.1 pelo nome do serviço do backend no docker-compose
    proxy_pass http://backend:8000; 
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Rotas de API do JobRunr (direcionadas para a porta 8000 do container backend)
  location /api/jobs { proxy_pass http://backend:8000; }
  location /api/recurring-jobs { proxy_pass http://backend:8000; }
  location /api/servers { proxy_pass http://backend:8000; }
  location /api/problems { proxy_pass http://backend:8000; }
  location /api/version { proxy_pass http://backend:8000; }
  
  location /sse { 
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
  }

  # --- ROTAS DA SUA API SPRING BOOT (PORTA 8080 NO CONTAINER BACKEND) ---
  location /api/ {
    # Troque 127.0.0.1 pelo nome do serviço do backend no docker-compose
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- FRONTEND SPA ---
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }
}