server {
  listen 80;
  server_name _;

  # DNS interno do Docker (sempre esse endereço)
  resolver 127.0.0.11 valid=30s; 

  root /usr/share/nginx/html;
  index index.html;

  # Criamos uma variável para o nome do serviço (ajuste 'backend' para o seu nome real)
  set $upstream_backend backend;

  # --- ROTAS DO JOBRUNR ---
  location /dashboard {
    proxy_pass http://$upstream_backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/jobs { proxy_pass http://$upstream_backend:8000; }
  location /api/recurring-jobs { proxy_pass http://$upstream_backend:8000; }
  location /api/servers { proxy_pass http://$upstream_backend:8000; }
  location /api/problems { proxy_pass http://$upstream_backend:8000; }
  location /api/version { proxy_pass http://$upstream_backend:8000; }
  
  location /sse { 
    proxy_pass http://$upstream_backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
  }

  # --- ROTAS DA API ---
  location /api/ {
    proxy_pass http://$upstream_backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}