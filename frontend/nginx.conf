server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- ROTAS DO JOBRUNR (PORTA 8000) ---
  
  # Roteia a interface visual (agora em /dashboard) para o Undertow do JobRunr
  location /dashboard {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Desvia as chamadas de API internas do JobRunr para a porta 8000
  location /api/jobs { proxy_pass http://127.0.0.1:8000; }
  location /api/recurring-jobs { proxy_pass http://127.0.0.1:8000; }
  location /api/servers { proxy_pass http://127.0.0.1:8000; }
  location /api/problems { proxy_pass http://127.0.0.1:8000; }
  location /api/version { proxy_pass http://127.0.0.1:8000; }
  location /sse { proxy_pass http://127.0.0.1:8000; }

  # Redireciona os acessos da URL antiga (/jobrunr) para a nova rota padrão (/dashboard)
  location /jobrunr {
    return 301 /dashboard;
  }

  # --- ROTAS DA SUA APLICAÇÃO (PORTA 8080) ---

  # Encaminha APIs de negócio para o backend Spring Boot
  location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- FRONTEND SPA ---

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Servir arquivos estáticos com cache básico
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }
}