server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Encaminha APIs para o backend Spring Boot
  location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Encaminha o dashboard do JobRunr para o backend
  # (evita cair no fallback do frontend SPA)
  location /jobrunr/ {
    proxy_pass http://127.0.0.1:8080/jobrunr/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /jobrunr {
    return 301 /jobrunr/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Opcional: servir arquivos estáticos com cache básico
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }
}
